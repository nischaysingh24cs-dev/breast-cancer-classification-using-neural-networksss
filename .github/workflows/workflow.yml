name: CI

# Run on every push and pull request to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies, linters and test runner
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 nose
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Lint with flake8
      - name: Lint with flake8
        run: |
          # Stop the build on Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat everything else as warnings (don't fail the build)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 5. Run unit tests with nose
      - name: Test with nose
        run: |
          nosetests -v
