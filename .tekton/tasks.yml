# Tekton Tasks: cleanup + test
# Apply with:  tkn task create -f tasks.yml   (or:  kubectl apply -f tasks.yml)

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  workspaces:
    - name: source
  steps:
    - name: cleanup
      image: alpine:3
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        echo "Removing build artifacts and temporary files..."
        rm -rf build dist *.egg-info .pytest_cache .nose_cache
        find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
        find . -type f -name "*.pyc" -delete 2>/dev/null || true
        echo "Cleanup complete."

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test
spec:
  workspaces:
    - name: source
  steps:
    - name: run-tests
      image: python:3.10
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        python -m pip install --upgrade pip
        pip install nose
        echo "Running unit tests with nose..."
        nosetests -v
